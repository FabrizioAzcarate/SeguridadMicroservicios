version: '3.9'

services:
  auth_service:
    build: ./auth_service
    container_name: auth_service
    ports:
      - "5002:5002"
    networks:
      - micro_net

  usuario_service:
    build: ./usuario_service
    container_name: usuario_service
    ports:
      - "5000:5000"
    networks:
      - micro_net

  pedido_service:
    build: ./pedido_service
    container_name: pedido_service
    ports:
      - "5001:5001"
    depends_on:
      - usuario_service
    networks:
      - micro_net

networks:
  micro_net: